id: az-direct-eu
name: AZ Direct GmbH
website: https://www.az-direct.com
category: marketing
jurisdictions:
  - DE
  - AT
  - EU
laws:
  - GDPR
data_sensitivity: 4
priority: medium

opt_out:
  - type: email
    endpoint: datenschutz@az-direct.com
    template: gdpr-art17
    locale: de
    required_fields:
      - full_name
      - address
      - email
    supports_suppression: true
    expected_response_days: 30

verification:
  ack_keywords:
    - "bestätigen"
    - "widerspruch"
    - "sperrvermerk"
  rejection_keywords:
    - "nicht möglich"
  human_required_keywords:
    - "ausweis"
    - "identitätsnachweis"

notes: |
  AZ Direct (part of the Bertelsmann group) is one of Germany's largest
  direct marketing data providers. They maintain the "Robinsonliste"
  suppression file for direct marketing. Requesting a Sperrvermerk
  (suppression flag) is often more effective than a full deletion request
  for marketing opt-outs, as it persists across database updates.
