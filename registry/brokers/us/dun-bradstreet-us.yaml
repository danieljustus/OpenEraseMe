id: dun-bradstreet-us
name: Dun & Bradstreet (US)
website: https://www.dnb.com
category: marketing
jurisdictions:
  - US
laws:
  - CCPA
data_sensitivity: 4
priority: medium

opt_out:
  - type: email
    endpoint: privacy@dnb.com
    template: ccpa-deletion
    locale: en
    required_fields:
      - full_name
      - email
      - address
    supports_suppression: true
    expected_response_days: 30

  - type: web_form
    url: https://www.dnb.com/utility-pages/ccpa-request.html
    form_spec:
      steps:
        - goto: .
        - fill:
            "input[name=first_name]": "${first_name}"
            "input[name=last_name]": "${last_name}"
            "input[name=email]": "${email}"
            "input[name=address]": "${address}"
        - click: "button[type=submit]"
        - wait_for: ".confirmation"
        - screenshot: "result"
      timeout_seconds: 45.0
      rate_limit_delay: 2.0

verification:
  ack_keywords:
    - "request received"
    - "opt-out"
    - "confirmation number"
  rejection_keywords:
    - "cannot verify"
  human_required_keywords:
    - "additional information"

notes: |
  D&B primarily holds business and B2B data, but also maintains profiles
  on business owners, executives, and sole proprietors. The CCPA opt-out
  covers California residents. International requests should use GDPR
  channels where applicable.
