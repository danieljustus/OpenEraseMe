id: nuwber-us
name: Nuwber
website: https://nuwber.com
category: people-search
jurisdictions:
  - US
laws:
  - CCPA
data_sensitivity: 3
priority: medium

opt_out:
  - type: web_form
    url: https://nuwber.com/removal/link
    form_spec:
      steps:
        - goto: .
        - fill:
            "input[name=first_name]": "${first_name}"
            "input[name=last_name]": "${last_name}"
            "input[name=email]": "${email}"
        - click: "button[type=submit]"
        - wait_for: ".success"
        - screenshot: "result"
      timeout_seconds: 45.0
      rate_limit_delay: 2.0

verification:
  ack_keywords:
    - "removal request"
    - "submitted"
    - "confirmation email"
  rejection_keywords:
    - "not found"
  human_required_keywords:
    - "verify"
