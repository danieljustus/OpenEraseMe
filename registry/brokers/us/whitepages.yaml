id: whitepages
name: Whitepages
website: https://www.whitepages.com
category: people-search
jurisdictions:
- US
laws:
- CCPA
data_sensitivity: 4
priority: high
disabled: true
opt_out:
- type: web_form
  url: https://www.whitepages.com/suppression_requests
  form_spec:
    steps:
    - goto: .
    - fill:
        '#first_name': ${full_name}
        '#last_name': ${last_name}
        '#email': ${email}
        '#phone': ${phone_number}
    - solve_captcha:
        type: recaptcha-v2
        site_key: NEEDS_RESEARCH_REPLACE_WITH_REAL_SITEKEY
        provider: capsolver
    - click: '#submit-request'
    - wait_for: .confirmation-message
    - screenshot: result
    timeout_seconds: 60.0
    rate_limit_delay: 2.5
verification:
  ack_keywords:
  - submitted
  - suppression request
  rejection_keywords:
  - cannot process
  - not found
  human_required_keywords:
  - additional information
notes: 'Disabled until the live reCAPTCHA site_key is captured from

  https://www.whitepages.com/suppression_requests. The previous

  placeholder ("6Lc...") was not a real key; CapSolver would fail.

  Also requires a phone_number identity field which is optional in

  the profile schema. To re-enable: inspect the form''s DOM for the

  data-sitekey attribute, replace NEEDS_RESEARCH_REPLACE_WITH_REAL_SITEKEY

  above, and set disabled: false.

  '
