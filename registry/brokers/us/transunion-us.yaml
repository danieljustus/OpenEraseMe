id: transunion-us
name: TransUnion (US Marketing)
website: https://www.transunion.com
category: credit
jurisdictions:
  - US
laws:
  - CCPA
data_sensitivity: 5
priority: high

opt_out:
  - type: web_form
    url: https://www.transunion.com/consumer-privacy
    form_spec:
      steps:
        - goto: .
        - fill:
            "input[name=first_name]": "${first_name}"
            "input[name=last_name]": "${last_name}"
            "input[name=dob]": "${date_of_birth}"
            "input[name=address]": "${address}"
            "input[name=email]": "${email}"
        - click: "button[type=submit]"
        - wait_for: ".confirmation"
        - screenshot: "result"
      timeout_seconds: 60.0
      rate_limit_delay: 5.0

  - type: email
    endpoint: privacy@transunion.com
    template: ccpa-deletion
    locale: en
    required_fields:
      - full_name
      - address
      - email
      - date_of_birth
    supports_suppression: true
    expected_response_days: 45

verification:
  ack_keywords:
    - "request received"
    - "opt-out"
    - "confirmation"
  rejection_keywords:
    - "cannot verify"
    - "additional information"
  human_required_keywords:
    - "identity verification"
    - "documentation"

notes: |
  TransUnion is one of the three major US credit bureaus. This entry covers
  their marketing data opt-out. For credit freeze, use the TransUnion Service
  Center at transunion.com/credit-freeze. Date of birth required for matching.
