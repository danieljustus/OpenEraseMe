id: experian-uk
name: Experian UK
website: https://www.experian.co.uk
category: credit
jurisdictions:
  - GB
laws:
  - GDPR
data_sensitivity: 5
priority: high

opt_out:
  - type: email
    endpoint: dataprotection.uk@experian.com
    template: gdpr-art17
    locale: en
    required_fields:
      - full_name
      - address
      - email
      - date_of_birth
    supports_suppression: false
    expected_response_days: 30

  - type: web_form
    url: https://www.experian.co.uk/consumer/experian-consumer-services-privacy-notice.html
    form_spec:
      steps:
        - goto: .
        - fill:
            "input[name=first_name]": "${first_name}"
            "input[name=last_name]": "${last_name}"
            "input[name=dob]": "${date_of_birth}"
            "input[name=email]": "${email}"
            "input[name=address]": "${address}"
            "input[name=postcode]": "${postal_code}"
        - click: "button[type=submit]"
        - wait_for: ".confirmation"
        - screenshot: "result"
      timeout_seconds: 60.0
      rate_limit_delay: 3.0

verification:
  ack_keywords:
    - "received"
    - "request"
    - "erasure"
    - "reference number"
  rejection_keywords:
    - "cannot process"
    - "legitimate interests"
  human_required_keywords:
    - "proof of identity"
    - "documentation"

notes: |
  Experian UK is regulated by the UK ICO. Post-Brexit, UK GDPR (UK GDPR)
  applies rather than EU GDPR — the substantive rights are equivalent.
  Credit files are covered under the Consumer Credit Act and Data Protection
  Act 2018. For credit file disputes, use Experian's statutory credit report
  service. For marketing opt-out, contact the marketing suppression team.
